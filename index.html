<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>rebirth</title>
<link rel="icon" href="./favicon.ico" type="image/x-icon">
<style>
  :root {
    --bg: #000;
    --fg: #f5f5f5;
    --dim: rgba(245, 245, 245, 0.45);
    --panel: rgba(20, 20, 22, 0.55);
    --ring: rgba(245, 245, 245, 0.18);
    --accent: #f5f5f5;
    /* Crimson sombre pour le bouton play */
    --crimson: #b01536;
    --crimson-bright: #da0e19;
    --crimson-glow: rgba(176, 21, 54, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* Occupe tout le viewport, y compris sur mobile (100dvh) */
  .stage {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  /* La vidéo garde son ratio 16:9 et s'adapte à toute taille de page
     sans jamais être rognée (letterbox automatique). */
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: var(--bg);
  }

  /* Vidéo portrait 9:16 sur téléphone : on remplit l'écran (léger recadrage
     des bords plutôt que des bandes noires). La classe n'est ajoutée que
     sur mobile, donc le rendu desktop reste en "contain". */
  body.is-mobile-video video {
    object-fit: cover;
  }

  /* --- Overlay de démarrage (bouton play + chargement) --- */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(0, 0, 0, 0.35);
    transition: opacity 0.45s ease, visibility 0.45s ease;
  }
  .overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .play-btn {
    position: relative;
    width: clamp(90px, 16vmin, 150px);
    height: clamp(90px, 16vmin, 150px);
    border: none;
    background: transparent;
    color: var(--crimson-bright);
    cursor: not-allowed;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    outline: none;
    /* battement discret pendant le chargement */
    opacity: 0.35;
    animation: breathe 2s ease-in-out infinite;
    transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),
                opacity 0.3s ease, filter 0.3s ease;
    filter: drop-shadow(0 0 10px transparent);
  }
  .play-btn:focus-visible { filter: drop-shadow(0 0 6px var(--crimson-bright)); }

  /* État prêt : triangle net, cliquable, léger halo crimson */
  .play-btn.ready {
    cursor: pointer;
    opacity: 1;
    animation: none;
    filter: drop-shadow(0 0 16px var(--crimson-glow));
  }
  .play-btn.ready:hover {
    transform: scale(1.08);
    filter: drop-shadow(0 0 26px var(--crimson-glow));
  }
  .play-btn.ready:active { transform: scale(0.96); }

  .play-btn svg { width: 100%; height: 100%; }

  /* --- Barre de contrôle (volume + mute), en haut à gauche, discrète --- */
  .controls {
    position: absolute;
    top: max(18px, env(safe-area-inset-top));
    left: max(18px, env(safe-area-inset-left));
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 6px;
    border-radius: 999px;
    background: transparent;
    border: 1px solid transparent;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-6px);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease,
                background 0.3s ease, border-color 0.3s ease, padding 0.3s ease, gap 0.3s ease;
    user-select: none;
  }
  /* Présent mais discret : icône seule, faiblement visible */
  .controls.visible {
    opacity: 0.4;
    visibility: visible;
    transform: translateY(0);
  }
  /* Au survol : panneau net, curseur déployé */
  .controls.visible:hover,
  .controls.visible:focus-within {
    opacity: 1;
    gap: 10px;
    padding: 5px 14px 5px 6px;
    background: rgba(18, 18, 20, 0.5);
    border-color: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, transform 0.15s ease;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: rgba(255, 255, 255, 0.1); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn:focus-visible { box-shadow: 0 0 0 2px rgba(255,255,255,0.6); outline: none; }
  .icon-btn svg { width: 19px; height: 19px; }

  /* Curseur de volume : masqué par défaut, déployé au survol du panneau */
  .volume {
    -webkit-appearance: none;
    appearance: none;
    width: 0;
    opacity: 0;
    height: 3px;
    border-radius: 999px;
    background: linear-gradient(to right, var(--accent) var(--fill, 60%), rgba(255,255,255,0.18) var(--fill, 60%));
    cursor: pointer;
    outline: none;
    transition: width 0.3s ease, opacity 0.3s ease;
  }
  .controls.visible:hover .volume,
  .controls.visible:focus-within .volume {
    width: clamp(80px, 20vw, 140px);
    opacity: 1;
  }
  .volume::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    transition: transform 0.15s ease;
  }
  .volume::-webkit-slider-thumb:hover { transform: scale(1.25); }
  .volume::-moz-range-thumb {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
  }
  .volume:focus-visible { box-shadow: 0 0 0 2px rgba(255,255,255,0.5); }

  @keyframes breathe {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.6; }
  }

  /* Accessibilité : on désactive les animations si l'utilisateur le demande */
  @media (prefers-reduced-motion: reduce) {
    .play-btn { animation: none; opacity: 0.55; }
    .overlay, .controls, .play-btn, .icon-btn { transition: none; }
  }

  /* --- Adaptations tactiles (téléphones / écrans sans survol) ---
     Ce bloc ne s'applique qu'aux appareils tactiles : le rendu desktop
     (souris) reste strictement inchangé. */
  @media (hover: none) and (pointer: coarse) {
    /* Cibles tactiles agrandies (recommandation ~44px) */
    .icon-btn { width: 44px; height: 44px; }
    .icon-btn svg { width: 22px; height: 22px; }

    /* Pas de survol possible : dès que le panneau est visible,
       il est déjà déployé et le curseur accessible au doigt. */
    .controls.visible {
      opacity: 1;
      gap: 10px;
      padding: 6px 16px 6px 6px;
      background: rgba(18, 18, 20, 0.55);
      border-color: rgba(255, 255, 255, 0.1);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
    }
    .controls.visible .volume {
      width: clamp(120px, 40vw, 180px);
      opacity: 1;
      height: 6px; /* piste plus épaisse, plus facile à viser */
    }
    .volume::-webkit-slider-thumb { width: 17px; height: 17px; }
    .volume::-moz-range-thumb { width: 17px; height: 17px; }

    /* iOS ignore video.volume (réglable seulement via les boutons
       physiques) : on masque alors le curseur, on garde le mute. */
    body.no-volume-control .volume { display: none; }
    body.no-volume-control .controls.visible { padding: 6px; }
  }
</style>
</head>
<body>
  <div class="stage">
    <video id="video" src="./video.mp4" playsinline preload="auto"></video>

    <!-- Overlay de démarrage -->
    <div class="overlay" id="overlay">
      <button class="play-btn" id="playBtn" type="button" disabled aria-label="Lire la vidéo">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"
             stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
          <path d="M8 5.2 L8 18.8 L19.5 12 Z"/>
        </svg>
      </button>
    </div>

    <!-- Contrôles de son -->
    <div class="controls" id="controls">
      <button class="icon-btn" id="muteBtn" type="button" aria-label="Couper le son">
        <svg id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"></svg>
      </button>
      <input type="range" class="volume" id="volume" min="0" max="100" value="60"
             aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="60">
    </div>
  </div>

<script>
(function () {
  const video    = document.getElementById('video');
  const overlay  = document.getElementById('overlay');
  const playBtn  = document.getElementById('playBtn');
  const controls = document.getElementById('controls');
  const muteBtn  = document.getElementById('muteBtn');
  const muteIcon = document.getElementById('muteIcon');
  const volume   = document.getElementById('volume');

  const DEFAULT_VOLUME = 0.60;
  let started = false;
  let lastVolume = DEFAULT_VOLUME; // pour restaurer après unmute
  let hideTimer;

  // --- Choix de la source selon l'appareil ---
  // Sur téléphone : vidéo portrait 9:16 (video_mobile.mp4), affichée en
  // "cover" pour remplir l'écran. Sur desktop/tablette : test.mp4 (16:9),
  // rendu inchangé.
  const coarsePointer = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  const phoneUA = /Android.+Mobile|iPhone|iPod|Windows Phone|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  const smallScreen = Math.min(window.screen.width, window.screen.height) <= 820;
  const isPhone = coarsePointer && (phoneUA || smallScreen);

  if (isPhone) {
    video.setAttribute('src', './video_mobile.mp4');
    document.body.classList.add('is-mobile-video');
    video.load(); // recharge avec la nouvelle source
  }

  // Icônes SVG monoline (trait) selon l'état du son
  const SPEAKER = '<path d="M4 9h3l4-3.5v13L7 15H4z"/>';
  const ICONS = {
    high: SPEAKER + '<path d="M14 8.5a5 5 0 010 7"/><path d="M16.5 6a9 9 0 010 12"/>',
    low:  SPEAKER + '<path d="M14 8.5a5 5 0 010 7"/>',
    mute: SPEAKER + '<path d="M14.5 9.5l5 5"/><path d="M19.5 9.5l-5 5"/>'
  };

  function renderVolumeIcon() {
    const muted = video.muted || video.volume === 0;
    if (muted) {
      muteIcon.innerHTML = ICONS.mute;
      muteBtn.setAttribute('aria-label', 'Rétablir le son');
    } else if (video.volume < 0.5) {
      muteIcon.innerHTML = ICONS.low;
      muteBtn.setAttribute('aria-label', 'Couper le son');
    } else {
      muteIcon.innerHTML = ICONS.high;
      muteBtn.setAttribute('aria-label', 'Couper le son');
    }
  }

  // Applique un volume 0..1 et met à jour l'UI
  function applyVolume(v) {
    v = Math.min(1, Math.max(0, v));
    video.volume = v;
    video.muted = (v === 0);
    volume.value = Math.round(v * 100);
    volume.setAttribute('aria-valuenow', volume.value);
    volume.style.setProperty('--fill', (video.muted ? 0 : v * 100) + '%');
    renderVolumeIcon();
  }

  // Initialisation du son
  video.volume = DEFAULT_VOLUME;
  applyVolume(DEFAULT_VOLUME);

  // Certains navigateurs mobiles (iOS Safari) ignorent video.volume :
  // le son ne se règle qu'avec les boutons physiques. On le détecte et,
  // le cas échéant, on masque le curseur (le mute reste fonctionnel).
  (function detectVolumeControl() {
    const test = 0.35;
    video.volume = test;
    const supported = Math.abs(video.volume - test) < 0.01;
    if (!supported) document.body.classList.add('no-volume-control');
    applyVolume(DEFAULT_VOLUME); // on restaure le volume voulu
  })();

  // --- Détection du chargement : on attend d'avoir assez de données
  //     pour lire sans coupure (canplaythrough) avant d'activer le bouton ---
  function markReady() {
    if (playBtn.classList.contains('ready')) return;
    playBtn.classList.add('ready');
    playBtn.disabled = false;
  }

  video.addEventListener('canplaythrough', markReady);
  // Filet de sécurité : si l'événement tarde mais que le lecteur est prêt
  video.addEventListener('canplay', function () {
    if (video.readyState >= 4) markReady();
  });

  video.addEventListener('error', function () {
    playBtn.classList.remove('ready');
    playBtn.disabled = true;
    playBtn.title = 'Impossible de charger la vidéo (./test.mp4).';
  });

  // Passe la page entière en plein écran (équivalent visuel du F11).
  // Doit être appelé dans un geste utilisateur ; on ignore les échecs
  // silencieusement (ex. iOS Safari qui ne le supporte pas sur la page).
  function enterFullscreen() {
    if (document.fullscreenElement) return;
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen
              || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (!req) return;
    try {
      const p = req.call(el);
      if (p && p.catch) p.catch(function () {});
    } catch (e) { /* non supporté : lecture normale sans plein écran */ }
  }

  // --- Démarrage / relance de la lecture ---
  playBtn.addEventListener('click', function () {
    if (playBtn.disabled) return;
    enterFullscreen(); // dans le geste de clic, pour être autorisé
    if (video.ended) video.currentTime = 0; // en fin de vidéo : on repart du début
    video.play().then(function () {
      started = true;
      overlay.classList.add('hidden');
      showControls();
    }).catch(function () {
      playBtn.title = 'La lecture n’a pas pu démarrer. Réessayez.';
    });
  });

  // --- Fin de vidéo : on réaffiche le triangle pour relancer ---
  video.addEventListener('ended', function () {
    overlay.classList.remove('hidden');
    controls.classList.remove('visible');
    clearTimeout(hideTimer);
  });

  // --- Empêche toute mise en pause volontaire pendant la lecture ---
  video.addEventListener('pause', function () {
    if (started && !video.ended) {
      video.play().catch(function () {
        // Sur mobile, le système peut interdire une reprise automatique
        // (verrouillage, appel, retour d'arrière-plan). On réaffiche alors
        // le triangle pour que l'utilisateur relance d'un tap.
        overlay.classList.remove('hidden');
      });
    }
  });

  // --- Contrôles du son ---
  volume.addEventListener('input', function () {
    const v = parseInt(volume.value, 10) / 100;
    lastVolume = v > 0 ? v : lastVolume;
    applyVolume(v);
  });

  muteBtn.addEventListener('click', function () {
    if (video.muted || video.volume === 0) {
      applyVolume(lastVolume > 0 ? lastVolume : DEFAULT_VOLUME);
    } else {
      lastVolume = video.volume;
      applyVolume(0);
    }
  });

  // --- Auto-masquage des contrôles quand la souris est inactive ---
  function showControls() {
    if (!started) return;
    controls.classList.add('visible');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function () {
      controls.classList.remove('visible');
    }, 3000);
  }

  ['mousemove', 'touchstart', 'keydown'].forEach(function (evt) {
    document.addEventListener(evt, showControls, { passive: true });
  });
  controls.addEventListener('mouseenter', function () { clearTimeout(hideTimer); });
  controls.addEventListener('mouseleave', showControls);

  // --- Désactive le menu contextuel au clic droit (rien ne se passe) ---
  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
  });
})();
</script>
</body>
</html>
